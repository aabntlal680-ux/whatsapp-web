name: Ultimate Build and Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # لضمان دعم كافة المكتبات الحديثة و sqlite

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Global Fix & Dependency Install
      run: |
        # 1. إعداد pnpm ليتخطى أخطاء الـ Metadata التي واجهتنا في البداية
        pnpm config set resolution-mode highest
        
        # 2. تنظيف الذاكرة المؤقتة لضمان جلب بيانات صحيحة
        pnpm store prune
        
        # 3. التثبيت الشامل لكل المشاريع الفرعية (Recursive) 
        # مع تجاهل ملف القفل التالف وتجاوز أخطاء الوقت
        pnpm install --no-frozen-lockfile --prefer-offline=false

    - name: Build Project
      # تنفيذ البناء لكل الأجزاء داخل الـ Monorepo
      run: pnpm run build --if-present

    - name: Upload Production Build
      uses: actions/upload-artifact@v4
      with:
        name: Complete-Project-Bundle
        path: .
