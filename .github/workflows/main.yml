name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        # أضفنا --no-frozen-lockfile لتجنب تعارض الملفات وقمنا بتعطيل السكريبتات التي تسبب الخطأ
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build project
        run: pnpm build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          # قمت بتغيير المسار ليرفع المجلد بالكامل لضمان العثور على الملفات
          path: . 
          retention-days: 5
