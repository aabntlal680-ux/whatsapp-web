name: Build and Package Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # العودة لنسخة مستقرة

    - name: Force Install Dependencies with NPM
      run: |
        # حذف ملفات pnpm لكي لا يحدث تعارض
        rm -f pnpm-lock.yaml
        # التثبيت باستخدام npm مع إجبار النظام على التجاوز
        npm install --force

    - name: Build project
      run: npm run build --if-present

    - name: Upload Production Build
      uses: actions/upload-artifact@v4
      with:
        name: WhatsApp-Project-Files
        path: .
