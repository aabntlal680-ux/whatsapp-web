name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build

      # هذا الجزء هو المسؤول عن إظهار خيار التنزيل للملفات الناتجة
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: dist/ # أو المسار الذي تخرج فيه ملفات البناء الخاصة بمشروعك
