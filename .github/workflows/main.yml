name: Production Build Fix
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build --if-present

      - name: Upload Production Build
        uses: actions/upload-artifact@v4
        with:
          name: alwaleed-foundation-files
          path: |
            dist/
            build/
            .next/
            out/
          if-no-files-found: warn
