name: Build and Package

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 8

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Build project
      run: pnpm run build --if-present

    # هذه الخطوة هي التي ستعطيك رابط التنزيل
    - name: Upload Production Build
      uses: actions/upload-artifact@v4
      with:
        name: production-files
        path: ./      # هنا نحدد المجلد الذي نريد ضغطه (يمكنك تغييره لمجلد البناء مثل ./dist)
