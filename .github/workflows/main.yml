name: Build and Package Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: latest # استخدام أحدث إصدار لدعم ميزة Catalogs

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      # استخدام --no-frozen-lockfile لتجاوز تعارضات ملف التثبيت إذا وجدت
      run: pnpm install --no-frozen-lockfile

    - name: Build project
      run: pnpm run build --if-present

    # ميزة رفع الملفات والحصول على رابط تنزيل (Artifacts)
    - name: Upload Production Build
      uses: actions/upload-artifact@v4
      with:
        name: WhatsApp-Project-Files
        path: . 
        # ملاحظة: إذا كان مشروعك ينتج مجلد بناء مثل 'dist' أو 'build'
        # يفضل تغيير المسار أعلاه ليكون المجلد الناتج فقط.
