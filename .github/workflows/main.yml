name: Build and Package Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # نثبت pnpm كأداة فقط لتجنب خطأ "pnpm not found" لاحقاً
    - name: Install pnpm
      run: npm install -g pnpm

    - name: Clean and Install with NPM
      run: |
        # حذف ملفات القفل التي تسبب المشاكل
        rm -f pnpm-lock.yaml
        rm -f package-lock.json
        # التثبيت باستخدام npm العادي (أكثر تسامحاً مع الأخطاء)
        npm install --force

    - name: Build project
      # الآن سننفذ البناء، وإذا نادى المشروع pnpm سيجده موجوداً
      run: npm run build --if-present

    - name: Upload Production Build
      uses: actions/upload-artifact@v4
      with:
        name: WhatsApp-Project-Files
        path: .
