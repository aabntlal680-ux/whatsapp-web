workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          # 1. تثبيت pnpm بالقوة وتفريغ الكاش التالف تماماً لمنع خطأ الـ HOIST DIFF
          npm install -g pnpm --force
          rm -rf node_modules .pnpm-store pnpm-lock.yaml
          
          # 2. إنشاء ملف إعدادات صارم لإجبار pnpm على رفع وحقن كافة الـ Plugins تلقائياً (الحل الجذري)
          echo "shamefully-hoist=true" > .npmrc
          echo "auto-install-peers=true" >> .npmrc
          echo "public-hoist-pattern[]=*expo*" >> .npmrc
          echo "public-hoist-pattern[]=*react-native*" >> .npmrc
          
          # 3. التثبيت النظيف بالهيكلية المسطحة الحقيقية التي يطلبها أندرويد
          pnpm install --no-frozen-lockfile
      - name: Build APK
        script: |
          # 4. تجهيز متغيرات البيئة ومسار نود
          NODE_PATH=$(which node)
          export NODE_EXECUTABLE_PATH=$NODE_PATH
          
          # 5. تنظيف وإعادة بناء مجلد أندرويد
          rm -rf android
          npx expo prebuild --platform android --no-install
          
          # 6. تشغيل البناء النهائي المستقر والتجميع بالقوة
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PnodeExecutable=$NODE_PATH

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
