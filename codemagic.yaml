Workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          # 1. تثبيت pnpm بالقوة وتفريغ الكاش التالف تماماً لمنع خطأ الـ HOIST DIFF
          npm install -g pnpm --force
          rm -rf node_modules .pnpm-store pnpm-lock.yaml
          
          # 2. التثبيت النظيف بالهيكلية المسطحة الحقيقية التي يطلبها أندرويد
          pnpm install --no-frozen-lockfile --shamefully-hoist
      - name: Build APK
        script: |
          # 3. تجهيز متغيرات البيئة ومسار نود
          NODE_PATH=$(which node)
          export NODE_EXECUTABLE_PATH=$NODE_PATH
          
          # 4. تنظيف وإعادة بناء مجلد أندرويد
          rm -rf android
          npx expo prebuild --platform android --no-install
          
          # 5. إصلاح توافقية الملحقات ومكونات السوفتوير لـ Expo 54 و Gradle 8+
          # إجبار Gradle على قراءة إعدادات الملحقات من المسار الصحيح وتخطي تعارض مكون الـ release
          if [ -d "android" ]; then
            echo "org.gradle.vfs.watch=false" >> android/gradle.properties
            echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          fi
          
          # 6. تشغيل البناء النهائي المستقر والتجميع مع تمرير خصائص تخطي أخطاء المكونات
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -PnodeExecutable=$NODE_PATH \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
