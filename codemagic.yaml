workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          # 1. تثبيت pnpm بالقوة وتفريغ الكاش التالف تماماً لمنع خطأ الـ HOIST DIFF
          npm install -g pnpm --force
          rm -rf node_modules .pnpm-store pnpm-lock.yaml
          
          # 2. التثبيت النظيف بالهيكلية المسطحة الحقيقية التي يطلبها أندرويد
          pnpm install --no-frozen-lockfile --shamefully-hoist
      - name: Build APK
        script: |
          # 3. تجهيز متغيرات البيئة ومسار نود
          NODE_PATH=$(which node)
          export NODE_EXECUTABLE_PATH=$NODE_PATH
          
          # 4. تنظيف وإعادة بناء مجلد أندرويد
          rm -rf android
          npx expo prebuild --platform android --no-install
          
          # 5. حل مشكلة مسارات pnpm لـ Expo 54 ومنع خطأ expo-constants
          echo "module.exports = { reactNativePath: './node_modules/react-native' };" > react-native.config.js
          
          # 6. حل جذري لخطأ السطر 85 (تعارض مكون الـ release في Gradle 8.8)
          # نقوم بتهيئة إعدادات الملحقات وملف الـ settings ليتوافق تلقائياً مع السوفتوير الحالي
          if [ -d "android" ]; then
            echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
            sed -i '' 's/components.release/components.findByName("release")/g' android/build.gradle 2>/dev/null || sed -i 's/components.release/components.findByName("release")/g' android/build.gradle
          fi

          # 7. تشغيل البناء النهائي المستقر والتجميع
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PnodeExecutable=$NODE_PATH

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
