workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          # 1. تثبيت pnpm وتثبيت الحزم بهيكلية مسارات حقيقية يراها أندرويد
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --shamefully-hoist
      - name: Build APK
        script: |
          # 2. تجهيز متغيرات البيئة ومسار النود الرسمي
          NODE_PATH=$(which node)
          export NODE_EXECUTABLE_PATH=$NODE_PATH
          
          # 3. تنظيف أي بقايا بناء قديم لمنع تعليق السطر 13
          rm -rf android
          
          # 4. إنشاء مجلد أندرويد نظيف كلياً متوافق مع الحزم المرفوعة
          npx expo prebuild --platform android --no-install
          
          # 5. تشغيل البناء النهائي وتمرير المسار مباشرة لـ Gradle
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PnodeExecutable=$NODE_PATH

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
