workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile
      - name: Build APK
        script: |
          # 1. تجهيز المسارات
          NODE_PATH=$(which node)
          
          # 2. إنشاء مجلد الأندرويد
          npx expo prebuild --platform android --no-install
          
          # 3. تعديل المسار الأساسي لـ Node
          sed -i '' "s#node#$NODE_PATH#g" android/settings.gradle
          
          # 4. (الحل النووي) نسخ مكتبة Gradle Plugin يدوياً لداخل المجلد
          # لكي لا يضطر النظام للبحث عنها في node_modules المعقدة
          mkdir -p android/gradle-plugin
          cp -R node_modules/@react-native/gradle-plugin/* android/gradle-plugin/
          
          # 5. إخبار الملف باستخدام النسخة المحلية التي نسخناها للتو
          echo "includeBuild('gradle-plugin')" >> android/settings.gradle

          # 6. التنفيذ النهائي
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PnodeExecutable=$NODE_PATH

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
