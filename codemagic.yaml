workflows:
  android-workflow:
    name: Android Build

    environment:
      java: 17

    scripts:
      - name: Install Dependencies
        script: |
          npm install

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

    artifacts:
      - android/app/build/outputs/**/*.apk
