workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install and Fix Config
        script: |
          export NODE_OPTIONS=--openssl-legacy-provider
          export CI=1
          
          # 1. تثبيت المكاتب الأساسية أولاً
          npm install --legacy-peer-deps
          
          # 2. إجبار Expo على إنشاء ملفات الأندرويد بدون تثبيت مكاتب داخلية
          npx expo prebuild --platform android --no-install
          
          # 3. تثبيت المكاتب التي أضافها Expo قسراً عبر npm
          npm install --legacy-peer-deps
      - name: Build Android APK
        script: |
          export NODE_OPTIONS=--openssl-legacy-provider
          export CI=1
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
