workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --shamefully-hoist
      - name: Build APK
        script: |
          # 1. تجهيز متغيرات البيئة ومسار النود الرسمي
          NODE_PATH=$(which node)
          export NODE_EXECUTABLE_PATH=$NODE_PATH
          
          # 2. تنظيف أي بقايا بناء قديم
          rm -rf android
          
          # 3. إنشاء مجلد أندرويد نظيف
          npx expo prebuild --platform android --no-install
          
          # 4. تشغيل البناء النهائي باستخدام أمر التجميع المتوافق لمنع خطأ الـ release property
          cd android
          chmod +x gradlew
          ./gradlew assemble -PbuildVariant=release --no-daemon -PnodeExecutable=$NODE_PATH

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
