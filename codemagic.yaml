workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          # 1. تثبيت pnpm بالقوة وتفريغ الكاش التالف تماماً لمنع خطأ الـ HOIST DIFF
          npm install -g pnpm --force
          rm -rf node_modules .pnpm-store pnpm-lock.yaml
          
          # 2. التثبيت النظيف بالهيكلية المسطحة الحقيقية التي يطلبها أندرويد
          pnpm install --no-frozen-lockfile --shamefully-hoist
      - name: Build APK
        script: |
          # 3. تجهيز متغيرات البيئة ومسار نود
          NODE_PATH=$(which node)
          export NODE_EXECUTABLE_PATH=$NODE_PATH
          
          # 4. تنظيف وإعادة بناء مجلد أندرويد
          rm -rf android
          npx expo prebuild --platform android --no-install
          
          # 5. إصلاح جذري لملفات expo-modules-core المتواجدة داخل كاش pnpm (السطر 85 و خطأ الملحق)
          # نقوم بتعديل صياغة الـ release برمجياً داخل حزمة الـ node_modules الأساسية قبل بدء Gradle
          TARGET_FILE=$(find node_modules/.pnpm -name "ExpoModulesCorePlugin.gradle" 2>/dev/null | head -n 1)
          if [ -not -z "$TARGET_FILE" ]; then
            sed -i '' 's/components.release/components.findByName("release")/g' "$TARGET_FILE" 2>/dev/null || sed -i 's/components.release/components.findByName("release")/g' "$TARGET_FILE"
          fi
          
          # 6. تشغيل البناء المستقر عبر تنفيذ تجميع الحزم المتوافقة
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PnodeExecutable=$NODE_PATH

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
