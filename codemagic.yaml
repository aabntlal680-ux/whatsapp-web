workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          export NODE_OPTIONS=--openssl-legacy-provider
          export CI=1
          # تثبيت pnpm وتثبيت المكتبات مع تجاهل القيود
          npm install -g pnpm
          pnpm install --no-frozen-lockfile --resolution-mode=highest
      - name: Install and Fix Config
        script: |
          export NODE_OPTIONS=--openssl-legacy-provider
          export CI=1
          # إنشاء ملفات الأندرويد
          npx expo prebuild --platform android --no-install
      - name: Build Android APK
        script: |
          export NODE_OPTIONS=--openssl-legacy-provider
          export CI=1
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
