workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --shamefully-hoist
          
          # إجبار النظام على تحديث حزم إكسبو الأساسية للنسخة المتوافقة والمصلحة تلقائياً
          pnpm update expo-modules-core --latest
      - name: Build APK
        script: |
          # 1. تجهيز متغيرات البيئة ومسار Node
          NODE_PATH=$(which node)
          export NODE_EXECUTABLE_PATH=$NODE_PATH
          
          # 2. تنظيف وإعادة بناء مجلد أندرويد بالكامل بناءً على التحديث الجديد
          rm -rf android
          npx expo prebuild --platform android --no-install
          
          # 3. تنفيذ البناء الرسمي المستقر للأندرويد
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PnodeExecutable=$NODE_PATH

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
