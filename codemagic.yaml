workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile
      - name: Build APK
        script: |
          # 1. تجهيز المسارات وتصدير متغير النود الرسمي لـ Expo
          NODE_PATH=$(which node)
          export NODE_EXECUTABLE_PATH=$NODE_PATH
          
          # 2. إنشاء مجلد الأندرويد الأصلي والنظيف
          npx expo prebuild --platform android --no-install
          
          # 3. نسخ مكتبة Gradle Plugin يدوياً لداخل المجلد
          mkdir -p android/gradle-plugin
          cp -R node_modules/@react-native/gradle-plugin/* android/gradle-plugin/
          
          # 4. إخبار الملف باستخدام النسخة المحلية التي نسخناها
          echo "includeBuild('gradle-plugin')" >> android/settings.gradle

          # 5. التنفيذ النهائي المباشر وتمرير المسار للـ Gradle
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PnodeExecutable=$NODE_PATH

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
