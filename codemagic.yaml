workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Setup Environment and pnpm
        script: |
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile
      - name: Clean and Regenerate Android
        script: |
          # حذف أي مجلد أندرويد قديم لتجنب تعارض الـ "null"
          rm -rf android
          # إعادة إنشاء المجلد نظيفاً تماماً
          npx expo prebuild --platform android --clean --no-install
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          # تشغيل البناء مع تجاوز مشاكل الـ "Included build"
          ./gradlew assembleRelease -x lint --stacktrace
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
