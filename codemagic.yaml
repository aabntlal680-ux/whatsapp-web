workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          # 1. تثبيت pnpm وتحديثه
          npm install -g pnpm --force
          
          # 2. إجبار pnpm على التثبيت بالهيكلية المطلوبة وتخطي خطأ الـ HOIST_PATTERN_DIFF بالقوة
          pnpm install --no-frozen-lockfile --shamefully-hoist --force
          
          # 3. إضافة حزمة الـ gradle-plugin إلى جذر الـ Workspace
          pnpm add expo-module-gradle-plugin --save-dev -w --force
      - name: Build APK
        script: |
          # 4. تجهيز مسارات نود لـ Expo
          NODE_PATH=$(which node)
          export NODE_EXECUTABLE_PATH=$NODE_PATH
          
          # 5. تنظيف وبناء مجلد أندرويد
          rm -rf android
          npx expo prebuild --platform android --no-install
          
          # 6. ربط مكتبة الـ Gradle بملف الإعدادات
          echo "includeBuild('node_modules/expo-module-gradle-plugin')" >> android/settings.gradle

          # 7. تعديل ملف إكسبو الداخلي لحل مشكلة الـ release property
          TARGET_FILE=$(find node_modules -name "ExpoModulesCorePlugin.gradle" | head -n 1)
          if [ -f "$TARGET_FILE" ]; then
            sed -i '' '/withVariants/d' "$TARGET_FILE" || sed -i '/withVariants/d' "$TARGET_FILE"
          fi
          
          # 8. التجميع وبناء الـ APK
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PnodeExecutable=$NODE_PATH

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
