workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile
      - name: Build APK
        script: |
          # 1. تعريف المسارات
          NODE_PATH=$(which node)
          
          # 2. بناء مجلد الأندرويد
          npx expo prebuild --platform android --no-install
          
          # 3. إصلاح المسارات في settings.gradle (للسطر 2 والسطر 13)
          sed -i '' "s#node#$NODE_PATH#g" android/settings.gradle
          
          # 4. الحل الجذري: إخبار Gradle بمكان المكتبة يدوياً لتجنب قيمة null
          PLUGIN_PATH=$(pwd)/node_modules/@react-native/gradle-plugin
          echo "includeBuild('$PLUGIN_PATH')" >> android/settings.gradle

          # 5. تشغيل البناء مع تمرير المسار كمعامل إضافي
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PnodeExecutable=$NODE_PATH

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
