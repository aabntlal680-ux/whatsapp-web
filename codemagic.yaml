workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile
      - name: Wipe and Rebuild Android
        script: |
          # مسح مجلد الأندرويد القديم تماماً لتجنب خطأ الـ null
          rm -rf android
          # إعادة إنشاء المجلد نظيفاً
          npx expo prebuild --platform android --no-install
      - name: Build APK
        script: |
          # تعريف مسار Node لـ Gradle
          export NODE_BINARY=$(which node)
          cd android
          chmod +x gradlew
          # البناء مع تنظيف كامل للذاكرة المؤقتة
          ./gradlew clean assembleRelease --no-daemon
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
