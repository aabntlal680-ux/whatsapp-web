workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          npm install -g pnpm --force
          rm -rf node_modules .pnpm-store pnpm-lock.yaml
          pnpm install --no-frozen-lockfile --shamefully-hoist
          
          # إجبار pnpm على تثبيت إضافة الـ gradle-plugin بشكل مستقل ورئيسي لكي يراها أندرويد فوراً
          pnpm add expo-module-gradle-plugin --save-dev
      - name: Build APK
        script: |
          # 1. تجهيز متغيرات البيئة ومسار نود لـ Expo
          NODE_PATH=$(which node)
          export NODE_EXECUTABLE_PATH=$NODE_PATH
          
          # 2. تنظيف وبناء مجلد أندرويد من الصفر
          rm -rf android
          npx expo prebuild --platform android --no-install
          
          # 3. ربط المجلد المباشر المضمون بملف الإعدادات
          echo "includeBuild('node_modules/expo-module-gradle-plugin')" >> android/settings.gradle

          # 4. قص السطر 85 التالف من ملف إكسبو الداخلي لمنع تعليقة الـ release property
          TARGET_FILE=$(find node_modules -name "ExpoModulesCorePlugin.gradle" | head -n 1)
          if [ -f "$TARGET_FILE" ]; then
            echo "Fixing Expo Component issue in: $TARGET_FILE"
            sed -i '' '/withVariants/d' "$TARGET_FILE" || sed -i '/withVariants/d' "$TARGET_FILE"
          fi
          
          # 5. تشغيل البناء والتجميع النهائي المستقر
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PnodeExecutable=$NODE_PATH

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
