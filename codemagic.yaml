workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    scripts:
      - name: Install Dependencies
        script: |
          rm -rf node_modules .pnpm-store pnpm-lock.yaml

          npm ci --legacy-peer-deps

      - name: Build APK
        script: |
          NODE_PATH=$(which node)
          export NODE_EXECUTABLE_PATH=$NODE_PATH

          cd android
          chmod +x gradlew

          ./gradlew assembleRelease --no-daemon -PnodeExecutable=$NODE_PATH

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
