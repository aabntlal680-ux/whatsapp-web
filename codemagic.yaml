workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest # يضمن وجود أحدث إصدار من Node
    scripts:
      - name: Setup pnpm and Clean
        script: | 
          # تثبيت pnpm وتجاوز مشاكل الأذونات
          npm install -g pnpm
          
          # تنظيف أي مخلفات قديمة في بيئة البناء
          rm -rf node_modules
          rm -rf android/app/build
          
          # تثبيت التبعيات مع تجاهل السكريبتات التي قد تعطل البناء
          pnpm install --no-frozen-lockfile
      - name: Expo Prebuild & Fix Permissions
        script: |
          # إنشاء مجلد أندرويد من جديد لضمان سلامة الملفات
          npx expo prebuild --platform android --clean --no-install
          
          # إصلاح أذونات Gradle فوراً
          chmod +x android/gradlew
      - name: Build Android APK (Release)
        script: |
          cd android
          # تشغيل تنظيف جرايدل قبل البناء
          ./gradlew clean
          # تنفيذ البناء مع إظهار تفاصيل الأخطاء إذا حدثت
          ./gradlew assembleRelease --stacktrace --info
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com # ضع بريدك هنا ليصلك إشعار بالنجاح
