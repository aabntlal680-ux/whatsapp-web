workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    scripts:
      - name: Install Dependencies
         script: |
          # تنظيف بقايا pnpm فقط
           rm -rf node_modules .pnpm-store pnpm-lock.yaml

          # تنظيف كاش npm
          npm cache clean --force

          # تثبيت الحزم
          npm install --legacy-peer-deps

          # التأكد من وجود React Native Gradle Plugin
          npm install @react-native/gradle-plugin --save-dev --legacy-peer-deps
     - name: Build APK
        script: |
          NODE_PATH=$(which node)
          export NODE_EXECUTABLE_PATH=$NODE_PATH

          cd android
          chmod +x gradlew

          ./gradlew assembleRelease --no-daemon
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
