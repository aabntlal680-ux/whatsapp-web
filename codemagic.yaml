workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Environment Setup
        script: |
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile
      - name: Wipe and Rebuild Android
        script: |
          # مسح شامل لضمان عدم وجود مسارات "null"
          rm -rf android
          rm -rf ~/.gradle/caches
          # إعادة توليد الملفات نظيفة تماماً
          npx expo prebuild --platform android --clean --no-install
          chmod +x android/gradlew
      - name: Build APK
        script: |
          cd android
          # استخدام فلاج لتجاهل إعدادات المشاريع المضمنة الخاطئة
          ./gradlew assembleRelease -Dorg.gradle.project.composite=false -x lint
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
