workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Setup Environment and pnpm
        script: |
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile
      - name: Clean and Regenerate Android
        script: |
          # حذف أي ملفات قديمة قد تسبب تعارض "null"
          rm -rf android
          # إعادة إنشاء مشروع الأندرويد من الصفر
          npx expo prebuild --platform android --clean --no-install
      - name: Build Android APK
        script: |
          cd android
          # حل مشكلة الـ null عن طريق التأكد من تهيئة الإعدادات
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease -x lint --stacktrace
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
