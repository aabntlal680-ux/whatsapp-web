workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile
      - name: Build APK
        script: |
          NODE_PATH=$(which node)
          npx expo prebuild --platform android --no-install
          
          # تعديل مباشر باستخدام البحث والاستبدال البسيط جداً
          sed -i '' "s/node/$NODE_PATH/g" android/settings.gradle
          
          cd android
          chmod +x gradlew
          # إضافة علم لتجاهل أي تحديثات تلقائية للملفات
          ./gradlew assembleRelease --no-daemon -PnodeExecutable=$NODE_PATH -x prepareKotlinBuildScriptModel

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
