workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          export NODE_OPTIONS=--openssl-legacy-provider
          export CI=1

          # 1. تثبيت pnpm في الماكينة لتجاوز منع npm في ملف package.json
          npm install -g pnpm

          # 2. تثبيت المكاتب مع حل مشكلة ERR_PNPM_MISSING_TIME
          pnpm install --no-frozen-lockfile --resolution-mode=highest

      - name: Install and Fix Config
        script: |
          export NODE_OPTIONS=--openssl-legacy-provider
          export CI=1

          # 3. إنشاء ملفات الأندرويد
          npx expo prebuild --platform android --no-install

      - name: Build Android APK
        script: |
          export NODE_OPTIONS=--openssl-legacy-provider
          export CI=1
          cd android
          # إعطاء صلاحية التنفيذ لملف Gradle
          chmod +x gradlew
          # بناء نسخة الـ APK
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
