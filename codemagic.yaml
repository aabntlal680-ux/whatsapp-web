workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install pnpm and Dependencies
        script: |
          npm install -g pnpm --force
          rm -rf node_modules .pnpm-store pnpm-lock.yaml
          pnpm install --no-frozen-lockfile --shamefully-hoist
      - name: Build APK
        script: |
          NODE_PATH=$(which node)
          export NODE_EXECUTABLE_PATH=$NODE_PATH
          
          if [ -d "android" ]; then
            sed -i '' 's/gradle-8.8-all.zip/gradle-8.13-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties 2>/dev/null || sed -i 's/gradle-8.8-all.zip/gradle-8.13-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
            
            mkdir -p node_modules/react-native/ReactAndroid
            echo "" > node_modules/react-native/ReactAndroid/gradle.properties
            mkdir -p android/node_modules/react-native/ReactAndroid 2>/dev/null || true
            echo "" > android/node_modules/react-native/ReactAndroid/gradle.properties 2>/dev/null || true
          fi
          
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PnodeExecutable=$NODE_PATH

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
