buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34

        kotlinVersion = "1.9.23"
        ndkVersion = "26.1.10909125"
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.5.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        
        // الطريقة الرسمية المضمونة: تضمين الـ Plugin مباشرة من مسار الـ node_modules المترابط
        classpath files("../node_modules/react-native/android/com/facebook/react/react-native-gradle-plugin/8.5.2/react-native-gradle-plugin-8.5.2.jar") {
            /* في حال اختلاف النسخة الداخلية، يتم تحميلها عبر الجرادل الرئيسي بالتوازي */
        }
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }

        // استخدام المسار المباشر الصريح للخادم دون الاعتماد على سكربت نود خارجي
        maven {
            url "$rootDir/../node_modules/react-native/android"
        }

        maven {
            url "$rootDir/../node_modules/jsc-android/dist"
        }
    }
}
