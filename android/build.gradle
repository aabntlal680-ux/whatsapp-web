buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34

        kotlinVersion = "1.9.23"
        ndkVersion = "26.1.10909125"
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.5.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        
        // جلب وتضمين الحزمة المطلوبة ديناميكياً عن طريق تشغيل سكربت البحث الخاص بـ React Native
        try {
            def reactNativeAndroidProject = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile()
            classpath fileTree(dir: "${reactNativeAndroidProject}/android", include: ["react-native-gradle-plugin-*.jar"])
        } catch (Exception e) {
            // في حال فشل البحث التلقائي لأي سبب
        }
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }

        // إعداد المسارات التلقائية لـ React Native و JSC
        def reactNativeAndroidProject = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile()
        maven {
            url "${reactNativeAndroidProject}/android"
        }

        def jscAndroidProject = new File(["node", "--print", "require.resolve('jsc-android/package.json')"].execute(null, rootDir).text.trim()).getParentFile()
        maven {
            url "${jscAndroidProject}/dist"
        }
    }
}
