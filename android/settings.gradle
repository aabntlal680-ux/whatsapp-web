pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    // إجبار Gradle على تضمين الملحق البرمجي لـ React Native من المجلد المحلي مباشرة ليتخطى السطر 10
    includeBuild(new File(rootDir, "../node_modules/@react-native/gradle-plugin"))
}

plugins {
    id("com.facebook.react.settings")
}

rootProject.name = 'Alwaleed Hub'

dependencyResolutionManagement {
    versionCatalogs {
        reactAndroidLibs {
            from(files("../node_modules/react-native/gradle/libs.versions.toml"))
        }
    }
}

// استدعاء ملفات الربط التلقائي القياسية لـ Expo و React Native عبر مسارات ثابتة ومباشرة
apply from: new File(rootDir, "../node_modules/expo/scripts/autolinking.gradle")
useExpoModules()

apply from: new File(rootDir, "../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesSettingsGradle(settings)

include ':app'
